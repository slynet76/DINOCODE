name: Build APK
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci --legacy-peer-deps
      - run: npm run prebuild:atelier
      - name: Build APK via EAS (remote)
        run: eas build --platform android --profile preview --non-interactive --wait
      - name: Download APK from EAS
        run: eas build:download --platform android --output ./app.apk --latest
      - uses: softprops/action-gh-release@v2
        with:
          files: ./app.apk
