name: Build APK
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci --legacy-peer-deps
      - run: npm run prebuild:atelier
      - name: Build APK via EAS (remote)
        run: eas build --platform android --profile preview --non-interactive --wait
      - name: Download APK from EAS
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --non-interactive --json 2>/dev/null | \
            python3 -c "import sys,json; builds=json.load(sys.stdin); print(builds[0]['artifacts']['buildUrl'])")
          echo "Downloading APK from: $APK_URL"
          curl -fL -o ./app.apk "$APK_URL"
      - uses: softprops/action-gh-release@v2
        with:
          files: ./app.apk
